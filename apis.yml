aid: united-technologies
name: United Technologies
url: https://raw.githubusercontent.com/api-evangelist/united-technologies/refs/heads/main/apis.yml
description: >-
  United Technologies Corporation (UTC) was an American multinational conglomerate that merged with Raytheon Company in
  2020 to form Raytheon Technologies, later renamed RTX Corporation in 2023. Prior to the merger, UTC's major
  subsidiaries included Otis Elevator (now independent), Carrier Global (now independent), Pratt & Whitney, and Collins
  Aerospace. Today, Collins Aerospace (formerly UTC Aerospace Systems and Rockwell Collins) provides aviation
  connectivity and data exchange services through the ARINC Digital Exchange platform, including messaging, flight
  operations, and weather data APIs for commercial aviation.
modified: '2026-05-19'
