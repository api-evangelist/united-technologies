apis:
  - name: Collins Aerospace ARINC Messaging API
    description: >-
      The Collins Aerospace ARINC Messaging API provides access to the ARINC Global Network for aviation messaging and
      data exchange. Supports ACARS, OOOI flight events, aviation weather, and operational communications between
      aircraft, airlines, airports, and ground operations. Part of the Collins Aerospace ARINC Digital Exchange
      platform.
