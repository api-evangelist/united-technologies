naftiko: 1.0.0-alpha2
info:
  label: Collins Aerospace ARINC Messaging API — Flights
  description: 'Collins Aerospace ARINC Messaging API — Flights. 1 operations. Lead operation: Collins Aerospace ARINC List
    Flights. Self-contained Naftiko capability covering one United Technologies business surface.'
  tags:
  - United Technologies
  - Flights
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    UNITED_TECHNOLOGIES_API_KEY: UNITED_TECHNOLOGIES_API_KEY
capability:
  consumes:
  - type: http
    namespace: arinc-messaging-flights
    baseUri: https://api.arinconline.collinsaerospace.com
    description: Collins Aerospace ARINC Messaging API — Flights business capability. Self-contained, no shared references.
    resources:
    - name: flights
      path: /flights
      operations:
      - name: listflights
        method: GET
        description: Collins Aerospace ARINC List Flights
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: airlineCode
          in: query
          type: string
          description: IATA airline code.
        - name: flightNumber
          in: query
          type: string
          description: Flight number.
        - name: departureDate
          in: query
          type: string
          description: Flight departure date (YYYY-MM-DD).
        - name: origin
          in: query
          type: string
          description: Origin airport IATA code.
        - name: destination
          in: query
          type: string
          description: Destination airport IATA code.
    authentication:
      type: bearer
      token: '{{env.UNITED_TECHNOLOGIES_API_KEY}}'
  exposes:
  - type: rest
    namespace: arinc-messaging-flights-rest
    port: 8080
    description: REST adapter for Collins Aerospace ARINC Messaging API — Flights. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/flights
      name: flights
      description: REST surface for flights.
      operations:
      - method: GET
        name: listflights
        description: Collins Aerospace ARINC List Flights
        call: arinc-messaging-flights.listflights
        with:
          airlineCode: rest.airlineCode
          flightNumber: rest.flightNumber
          departureDate: rest.departureDate
          origin: rest.origin
          destination: rest.destination
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: arinc-messaging-flights-mcp
    port: 9090
    transport: http
    description: MCP adapter for Collins Aerospace ARINC Messaging API — Flights. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: collins-aerospace-arinc-list-flights
      description: Collins Aerospace ARINC List Flights
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: arinc-messaging-flights.listflights
      with:
        airlineCode: tools.airlineCode
        flightNumber: tools.flightNumber
        departureDate: tools.departureDate
        origin: tools.origin
        destination: tools.destination
      outputParameters:
      - type: object
        mapping: $.
