naftiko: 1.0.0-alpha2
info:
  label: Collins Aerospace ARINC Messaging API — Messages
  description: 'Collins Aerospace ARINC Messaging API — Messages. 2 operations. Lead operation: Collins Aerospace ARINC List
    Messages. Self-contained Naftiko capability covering one United Technologies business surface.'
  tags:
  - United Technologies
  - Messages
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    UNITED_TECHNOLOGIES_API_KEY: UNITED_TECHNOLOGIES_API_KEY
capability:
  consumes:
  - type: http
    namespace: arinc-messaging-messages
    baseUri: https://api.arinconline.collinsaerospace.com
    description: Collins Aerospace ARINC Messaging API — Messages business capability. Self-contained, no shared references.
    resources:
    - name: messages
      path: /messages
      operations:
      - name: listmessages
        method: GET
        description: Collins Aerospace ARINC List Messages
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: messageType
          in: query
          type: string
          description: Filter by ARINC message type (ACARS, OOOI, etc.).
        - name: registration
          in: query
          type: string
          description: Aircraft registration number.
        - name: airlineCode
          in: query
          type: string
          description: IATA airline code.
        - name: flightNumber
          in: query
          type: string
          description: Flight number.
        - name: fromTime
          in: query
          type: string
          description: Start of time range (ISO 8601).
        - name: toTime
          in: query
          type: string
          description: End of time range (ISO 8601).
        - name: limit
          in: query
          type: integer
          description: Maximum number of messages to return.
        - name: offset
          in: query
          type: integer
          description: Pagination offset.
      - name: sendmessage
        method: POST
        description: Collins Aerospace ARINC Send Message
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.UNITED_TECHNOLOGIES_API_KEY}}'
  exposes:
  - type: rest
    namespace: arinc-messaging-messages-rest
    port: 8080
    description: REST adapter for Collins Aerospace ARINC Messaging API — Messages. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/messages
      name: messages
      description: REST surface for messages.
      operations:
      - method: GET
        name: listmessages
        description: Collins Aerospace ARINC List Messages
        call: arinc-messaging-messages.listmessages
        with:
          messageType: rest.messageType
          registration: rest.registration
          airlineCode: rest.airlineCode
          flightNumber: rest.flightNumber
          fromTime: rest.fromTime
          toTime: rest.toTime
          limit: rest.limit
          offset: rest.offset
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: sendmessage
        description: Collins Aerospace ARINC Send Message
        call: arinc-messaging-messages.sendmessage
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: arinc-messaging-messages-mcp
    port: 9090
    transport: http
    description: MCP adapter for Collins Aerospace ARINC Messaging API — Messages. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: collins-aerospace-arinc-list-messages
      description: Collins Aerospace ARINC List Messages
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: arinc-messaging-messages.listmessages
      with:
        messageType: tools.messageType
        registration: tools.registration
        airlineCode: tools.airlineCode
        flightNumber: tools.flightNumber
        fromTime: tools.fromTime
        toTime: tools.toTime
        limit: tools.limit
        offset: tools.offset
      outputParameters:
      - type: object
        mapping: $.
    - name: collins-aerospace-arinc-send-message
      description: Collins Aerospace ARINC Send Message
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: arinc-messaging-messages.sendmessage
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
